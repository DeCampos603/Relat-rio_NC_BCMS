name: Relatório de NCs — BCMS

on:
  # Execução automática em dias úteis
  # 09:30 BRT = 12:30 UTC (Brasil sem horário de verão desde 2019)
  schedule:
    - cron: '30 12 * * 1-5'

  # Permite disparar manualmente pela aba Actions
  workflow_dispatch:

jobs:
  gerar-relatorio:
    name: Gerar e enviar relatório BCMS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar relatório
        env:
          # ATENÇÃO: SPREADSHEET_ID NÃO entra aqui — é hardcoded no script.
          # Lição aprendida: o secret SPREADSHEET_ID foi historicamente
          # mal configurado e causava HTTP 404 silencioso.
          EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
          EMAIL_SENHA:     ${{ secrets.EMAIL_SENHA }}
          EMAIL_DESTINO:   ${{ secrets.EMAIL_DESTINO }}
          EMAIL_BCC:       ${{ secrets.EMAIL_BCC }}
        run: python relatorio_nc_bcms.py
